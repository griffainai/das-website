<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Driver Appreciation Solutions</title>
  <meta name="description" content="Sign in to your Fleet Portal to manage orders, track shipments, and access your driver recognition programs.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="css/styles.css?v=10">
  <link rel="icon" href="/images/logo.png" type="image/png">
  <style>
    /* ── Auth Page Layout ─────────────────────────────────── */
    .auth-page {
      min-height: 100vh;
      background: var(--black-2);
      display: flex;
      flex-direction: column;
    }
    .auth-nav {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(241,244,247,0.90);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .auth-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 var(--container-padding);
    }
    .auth-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    /* ── Auth Card ────────────────────────────────────────── */
    .auth-card {
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 460px;
    }
    @media (max-width: 520px) {
      .auth-card { padding: 40px 28px 36px; }
    }
    .auth-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .auth-logo-wrap img {
      height: 44px;
      width: auto;
    }
    .auth-divider-line {
      border: none;
      border-top: 1px solid var(--black-5);
      margin: 28px 0;
    }
    .auth-title {
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 0.9375rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    /* ── Google Button ────────────────────────────────────── */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      padding: 13px 24px;
      border-radius: var(--radius-full);
      border: 1.5px solid #DADCE0;
      background: #fff;
      color: #3C4043;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      text-decoration: none;
      margin-bottom: 20px;
    }
    .btn-google:hover {
      background: #F8F9FA;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transform: scale(1.02);
    }
    .btn-google:active { transform: scale(0.98); }
    .btn-google svg { flex-shrink: 0; }
    /* ── Separator ────────────────────────────────────────── */
    .auth-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 500;
    }
    .auth-or::before,
    .auth-or::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--black-5);
    }
    /* ── Form Fields ──────────────────────────────────────── */
    .auth-field {
      margin-bottom: 18px;
    }
    .auth-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .auth-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #D1D5DB;
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      color: var(--text-primary);
      background: #fff;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }
    .auth-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(26,46,110,0.10);
    }
    .auth-input::placeholder { color: #9CA3AF; }
    /* Password wrapper for show/hide toggle */
    .auth-input-wrap {
      position: relative;
    }
    .auth-input-wrap .auth-input {
      padding-right: 48px;
    }
    .auth-eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition-fast);
    }
    .auth-eye-btn:hover { color: var(--gold); }
    .auth-eye-btn svg { width: 18px; height: 18px; }
    .eye-closed { display: none; }
    /* ── Forgot link ──────────────────────────────────────── */
    .auth-forgot {
      display: block;
      text-align: right;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--gold);
      margin-top: -10px;
      margin-bottom: 20px;
      text-decoration: none;
    }
    .auth-forgot:hover { text-decoration: underline; text-underline-offset: 3px; }
    /* ── Submit Button ────────────────────────────────────── */
    .auth-submit {
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-full);
      border: none;
      background: var(--gold);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
      margin-top: 4px;
    }
    .auth-submit:hover {
      background: var(--gold-hover);
      transform: scale(1.03);
      box-shadow: var(--shadow-gold);
    }
    .auth-submit:active { transform: scale(0.97); }
    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    /* ── Error / Success Messages ─────────────────────────── */
    #auth-error {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-sm);
      color: #B91C1C;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 12px 16px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    /* ── Footer Link ──────────────────────────────────────── */
    .auth-footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .auth-footer-link a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer-link a:hover { text-decoration: underline; text-underline-offset: 3px; }
    /* ── Trust badge ──────────────────────────────────────── */
    .auth-trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--black-5);
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .auth-trust svg { width: 14px; height: 14px; color: var(--success); flex-shrink: 0; }
  </style>
</head>
<body class="auth-page">

<!-- ── Minimal Auth Nav ──────────────────────────────────── -->
<nav class="auth-nav">
  <div class="auth-nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="images/logo.png" alt="Driver Appreciation Solutions" class="nav-logo-img">
    </a>
    <a href="shop.html" class="btn btn-secondary btn-sm">Back to Shop</a>
  </div>
</nav>

<!-- ── Auth Body ─────────────────────────────────────────── -->
<main class="auth-body">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo-wrap">
      <img src="images/logo.png" alt="Driver Appreciation Solutions">
    </div>

    <!-- Title -->
    <p class="auth-title">Fleet Portal</p>
    <p class="auth-subtitle">Sign in to manage orders and recognition programs</p>

    <!-- Error -->
    <div id="auth-error" role="alert"></div>

    <!-- Google SSO -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <!-- Google G logo -->
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18L12.048 13.56c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042L3.964 10.71z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- OR -->
    <div class="auth-or">or</div>

    <!-- Email / Password Form -->
    <form id="login-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="login-email">Email Address</label>
        <input class="auth-input" type="email" id="login-email" name="email"
               placeholder="fleet@yourcompany.com" autocomplete="email" required>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="login-password">Password</label>
        <div class="auth-input-wrap">
          <input class="auth-input" type="password" id="login-password" name="password"
                 placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="auth-eye-btn"
                  onclick="togglePasswordVisibility('login-password', this)"
                  aria-label="Toggle password visibility">
            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
          </button>
        </div>
      </div>

      <a href="forgot-password.html" class="auth-forgot">Forgot password?</a>

      <button class="auth-submit" type="submit" id="login-btn">Sign In</button>
    </form>

    <!-- Footer links -->
    <p class="auth-footer-link">
      Don't have an account? <a href="signup.html">Create account</a>
    </p>

    <!-- Trust badge -->
    <div class="auth-trust">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      Secured with 256-bit SSL · Your data is never shared
    </div>

  </div>
</main>

<!-- Firebase Config (injects window.FIREBASE_* from Vercel env vars) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/cart.js"></script>

<script>
  // Redirect already-logged-in users
  redirectIfAuthed('account.html');

  // Form submit
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    clearAuthError();
    const btn = document.getElementById('login-btn');
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showAuthError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    await signInWithEmail(email, password);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  });
</script>

</body>
</html>
